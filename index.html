  });
  kc.appendChild(any?rows:el('p','sub','Logge deine Sätze, dann erscheint hier die Entwicklung.'));
  s.appendChild(kc);

  var rb=el('button','btn','Wochen-Review öffnen');
  rb.addEventListener('click',openReview);
  s.appendChild(rb);

  var mrb=el('button','btn ghost','Monats-Report öffnen');
  mrb.addEventListener('click',function(){
    var n=new Date();
    // ab dem 25. den laufenden Monat, sonst den letzten
    var y=n.getFullYear(),m=n.getMonth();
    if(n.getDate()<25){m=m-1;if(m<0){m=11;y--;}}
    if(!monthHasData(y,m)){toast('Noch keine Daten für '+MONTHS[m]);return;}
    openMonthReport(y,m);
  });
  s.appendChild(mrb);

  var dc=el('div','card tight');
  dc.appendChild(ey(C.blue,'Daten'));
  var rw=el('div','row');rw.style.cssText='gap:8px;margin-top:10px';
  var exb=el('button','btn ghost sm','Exportieren');
  exb.addEventListener('click',exportData);
  var imb=el('button','btn ghost sm','Importieren');
  imb.addEventListener('click',importData);
  rw.appendChild(exb);rw.appendChild(imb);
  dc.appendChild(rw);
  var dnote=el('p','tiny','Speicher-Ebene: '+STORE_LAYER+'. Alles liegt nur in diesem Browser — exportiere regelmässig, und immer bevor Claude ein App-Update veröffentlicht.');
  dnote.style.marginTop='9px';
  dc.appendChild(dnote);
  s.appendChild(dc);
}
function avgOf(vals){
  var v=vals.filter(function(x){return x>0;});
  if(!v.length)return null;
  return v.reduce(function(a,b){return a+b;},0)/v.length;
}
function exportData(){
  var json=JSON.stringify(D,null,2);
  var fname='tracker-'+today()+'.json';
  if(window.claude&&window.claude.downloads&&window.claude.downloads.save){
    window.claude.downloads.save({filename:fname,data:json})
      .then(function(){toast('Export gespeichert');})
      .catch(function(e){toast(e&&e.code==='declined'?'Export abgebrochen':'Export nicht möglich');});
    return;
  }
  var blob=new Blob([json],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=fname;
  a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href);},2000);
  toast('Export erstellt');
}
function importData(){
  var i=document.createElement('input');
  i.type='file';i.accept='application/json,.json';
  i.addEventListener('change',function(){
    var f=i.files&&i.files[0];if(!f)return;
    var r=new FileReader();
    r.onload=function(){
      try{
        var o=JSON.parse(r.result);
        if(!o||typeof o!=='object')throw 0;
        if(!confirm('Import überschreibt alle aktuellen Daten. Fortfahren?'))return;
        D=Object.assign({},DEF,o);save();render();toast('Import erfolgreich');
      }catch(e){toast('Datei nicht lesbar');}
    };
    r.readAsText(f);
  });
  i.click();
}

// ══════════════════════════════════════════════════════════
//  WOCHEN-REVIEW — interaktiver Wizard
// ══════════════════════════════════════════════════════════
function reviewDue(){
  var n=new Date();
  if(n.getDay()!==0)return false;
  var wk=isoWeek(n);
  return !(D.weeks[wk]&&D.weeks[wk].seen);
}
function reviewCtx(){
  var mon=mondayOf(new Date());
  var days=[];for(var i=0;i<7;i++)days.push(dk(addD(mon,i)));
  var weighIns=days.filter(function(k){return D.weights[k]!=null;}).length;
  var gymPlanned=0,gymDone=0;
  days.forEach(function(k){
    var a=ACTIVITIES[plannedFor(k)];
    if(a&&a.type==='gym'){gymPlanned++;if(isDone(k))gymDone++;}
  });
  var mv=days.map(function(k){return D.mood[k];}).filter(function(v){return typeof v==='number';});
  var sv=days.map(function(k){return D.sleepScore[k];}).filter(function(v){return typeof v==='number';});
  var moodAvg=mv.length?mv.reduce(function(a,b){return a+b;},0)/mv.length:null;
  var sleepAvg=sv.length?sv.reduce(function(a,b){return a+b;},0)/sv.length:null;
  var rate=ratePerWeek(21);
  var verdict,advice,tone;
  if(sick()){verdict='Krank-Woche';advice='Seit '+fmtDate(pk(D.sickSince))+' im Krank-Modus. Diese Woche zählt nicht — gesund werden ist das Programm.';tone='mut';}
  else if(rate===null){verdict='Noch zu wenig Daten';advice='Wiege dich 4×+ pro Woche, dann kann ich ab nächster Woche präzise anpassen.';tone='mut';}
  else if(weighIns<3){verdict='Zu wenige Wiegungen';advice='Diese Woche nur '+weighIns+' Messung'+(weighIns===1?'':'en')+'. Der Trend unten nutzt die letzten 3 Wochen.';tone='warn';}
  else if(rate>-0.25){verdict=rate>0.1?'Gewicht steigt':'Stagnation';advice='Trend '+n1(rate)+' kg/Wo — Ziel sind −0,5 bis −0,7. Unten schlage ich Massnahmen vor.';tone='warn';}
  else if(rate<-0.95){verdict='Zu schnell';advice='Trend '+n1(rate)+' kg/Wo — das kostet Muskeln und Leistung im Spiel.';tone='warn';}
  else{verdict='Im Zielkorridor';advice='Trend '+n1(rate)+' kg/Wo — genau richtig.';tone='ok';}
  return{week:isoWeek(new Date()),mon:mon,rate:rate,weighIns:weighIns,gymPlanned:gymPlanned,gymDone:gymDone,
         moodAvg:moodAvg,sleepAvg:sleepAvg,verdict:verdict,advice:advice,tone:tone};
}
var QS=[
  {id:'energy', q:'Wie war deine Energie diese Woche?', opts:['Niedrig','Mittel','Hoch']},
  {id:'hunger', q:'Wie war der Hunger?', opts:['Okay','Abends stark','Ständig']},
  {id:'training', q:'Wie lief das Training?', opts:['Passt','Zu schwer','Zu leicht','Keine Zeit']},
  {id:'pain', q:'Irgendwo Schmerzen?', opts:['Nein','Ja']}
];
var PAIN_OPTS=['Knie','Schulter','Unterer Rücken','Ellbogen','Woanders'];
function painAdvice(where){
  var map={
    'Knie':'Knie: Kniebeuge & Beinpresse 2 Wochen nur schmerzfrei und leicht (hohe Box, halbe Last). Wird es nicht besser → Physio.',
    'Schulter':'Schulter: Bankdrücken auf Kurzhanteln mit neutralem Griff umstellen, Schulterdrücken pausieren, Seitheben leicht. Face Pulls beibehalten.',
    'Unterer Rücken':'Unterer Rücken: RDL pausieren → Beinbeuger an der Maschine. Plank halten, Technik checken (Video machen). Schmerzfrei bleiben.',
    'Ellbogen':'Ellbogen: Curls & Trizeps 2 Wochen leicht mit 15–20 Wdh, Griff variieren (Seil statt Stange).',
    'Woanders':'Betroffene Übungen 2 Wochen 20 % leichter und nur im schmerzfreien Bereich. Hält es an → abklären lassen.'
  };
  return 'Schmerz-Protokoll · '+(map[where]||map['Woanders']);
}
function buildMeasures(a,ctx){
  var arr=[],ni=0;
  function act(id,label,fn){arr.push({id:id,label:label,fn:fn,on:true});}
  function note(label){arr.push({id:'note'+(ni++),label:label,fn:null});}

  // Krank-Woche: nichts anpassen, nur begleiten
  if(sick()){
    note('Krank-Woche: keine Kalorien- oder Trainings-Anpassungen. Gewicht diese Woche nicht bewerten (Wasser!).');
    note('Wenn du wieder fit bist: „Wieder gesund" drücken — die ersten Tage laufen dann automatisch leichter.');
    if(ctx.sleepAvg!==null&&ctx.sleepAvg<6)note('Schlaf ist jetzt Medizin: so viel wie möglich.');
    return arr;
  }

  var slow=ctx.rate!==null&&ctx.rate>-0.25;
  var fast=ctx.rate!==null&&ctx.rate<-0.95;

  if(ctx.rate===null||ctx.weighIns<3)note('Datenlage dünn: 4×+ wiegen und den YAZIO-Wochenschnitt eintragen — dann werden die Anpassungen präzise statt geschätzt.');
  if(slow&&a.hunger!=='Ständig')act('kcal-','Kalorien −150 → neues Ziel ca. '+(targets().kcal-150)+' kcal',function(){D.kcalAdjust-=150;});
  if(slow&&a.hunger==='Ständig')act('steps','Kalorien halten (Hunger ist schon hoch), dafür Schrittziel +2000 → '+Math.min(14000,D.stepGoal+2000).toLocaleString('de-DE'),function(){D.stepGoal=Math.min(14000,D.stepGoal+2000);});
  if(fast)act('kcal+','Kalorien +100 → neues Ziel ca. '+(targets().kcal+100)+' kcal (Muskelschutz)',function(){D.kcalAdjust+=100;});
  if(ctx.rate!==null&&!slow&&!fast)note('Kalorien bleiben — Tempo im Korridor ('+n1(ctx.rate)+' kg/Wo).');

  var needDeload=(a.training==='Zu schwer'||a.energy==='Niedrig');
  if(needDeload)act('deload','Deload-Woche bis '+fmtDate(addD(new Date(),7))+': überall 1 Satz weniger, RPE max 7. Danach automatisch wieder normal.',function(){D.deloadUntil=dk(addD(new Date(),7));D.lastDeloadAt=today();});
  if(a.training==='Zu leicht'&&!needDeload)act('boost','+1 Satz auf die Hauptübungen (●) für 2 Wochen',function(){D.boostUntil=dk(addD(new Date(),14));});
  if(a.training==='Keine Zeit')act('short','Kurz-Modus: Nebenübungen auf max 2 Sätze (~15 min kürzer pro Einheit)',function(){D.shortMode=true;});

  // Turnus-Deload alle 6–8 Wochen, auch wenn alles gut läuft
  var dd=deloadDueInfo();
  if(dd&&!needDeload&&a.training!=='Zu leicht')act('deload','Turnus-Deload (seit '+dd.weeks+' Wochen keiner): diese Woche überall 1 Satz weniger, RPE max 7. Geplante Erholung macht danach stärker.',function(){D.deloadUntil=dk(addD(new Date(),7));D.lastDeloadAt=today();});
  if(a.pain==='Ja')note(painAdvice(a.painWhere||'Woanders'));
  if(ctx.sleepAvg!==null&&ctx.sleepAvg<6)note('Schlaf-Ø '+n1(ctx.sleepAvg)+'/10: feste Bettzeit, Handy um 22:30 raus. Das bringt gerade mehr als jede Plan-Änderung.');
  if(ctx.moodAvg!==null&&ctx.moodAvg<5&&!needDeload)note('Stimmung Ø '+n1(ctx.moodAvg)+'/10 — wenn das nächste Woche so bleibt, nehmen wir bewusst Druck raus (Deload).');
  if(!arr.length)note('Alles im grünen Bereich — genau so weiter.');
  return arr;
}
function openReview(){
  UI.rev={step:0,ans:{},ms:null,kcal:(D.weeks[isoWeek(new Date())]&&D.weeks[isoWeek(new Date())].avgKcal)||''};
  drawReview();
}
function drawReview(){
  var ctx=reviewCtx();
  var R=UI.rev;
  openModal(function(mo){
    mo.appendChild(el('h2',null,'Wochen-Review'));
    mo.appendChild(el('p','sub',ctx.week+' · '+fmtDate(ctx.mon)+' – '+fmtDate(addD(ctx.mon,6))));
    var dots=el('div','steps-dots');
    for(var i=0;i<3;i++){var dd=el('i');if(i<=R.step)dd.className='on';dots.appendChild(dd);}
    mo.appendChild(dots);

    if(R.step===0){
      var v=el('div',ctx.tone==='ok'?'ok-box':(ctx.tone==='warn'?'warn-box':'card tight'));
      v.innerHTML='<b style="font-family:var(--display);font-size:15px">'+esc(ctx.verdict)+'</b>'+
        '<p style="margin:6px 0 0;line-height:1.55">'+esc(ctx.advice)+'</p>';
      mo.appendChild(v);
      var st=el('div','stat-grid');
      st.innerHTML=
        '<div class="stat"><b>'+(ctx.rate===null?'—':(ctx.rate>0?'+':'')+n1(ctx.rate))+'</b><small>kg / Woche</small></div>'+
        '<div class="stat"><b>'+ctx.gymDone+'/'+ctx.gymPlanned+'</b><small>Gym</small></div>'+
        '<div class="stat"><b>'+(ctx.moodAvg===null?'—':n1(ctx.moodAvg)+'/10')+'</b><small>Gefühl Ø</small></div>'+
        '<div class="stat"><b>'+(ctx.sleepAvg===null?'—':n1(ctx.sleepAvg)+'/10')+'</b><small>Schlaf Ø</small></div>';
      mo.appendChild(st);
      var nb=el('button','btn','Weiter: 4 kurze Fragen');
      nb.addEventListener('click',function(){R.step=1;drawReview();});
      mo.appendChild(nb);
      var cb=el('button','btn ghost','Später');
      cb.addEventListener('click',closeModal);
      mo.appendChild(cb);
    }

    else if(R.step===1){
      QS.forEach(function(q){
        var blk=el('div','qblock');
        blk.appendChild(el('div','q',q.q));
        var opts=el('div','qopts');
        q.opts.forEach(function(o){
          var b=el('button','chip',o);
          b.type='button';
          b.style.setProperty('--chip-on','var(--c-green)');
          b.setAttribute('aria-pressed',R.ans[q.id]===o?'true':'false');
          b.addEventListener('click',function(){R.ans[q.id]=o;R.ms=null;drawReview();});
          opts.appendChild(b);
        });
        blk.appendChild(opts);
        mo.appendChild(blk);
        if(q.id==='pain'&&R.ans.pain==='Ja'){
          var pw=el('div','qopts');
          PAIN_OPTS.forEach(function(o){
            var b2=el('button','chip',o);
            b2.type='button';
            b2.style.setProperty('--chip-on','var(--bad)');
            b2.setAttribute('aria-pressed',R.ans.painWhere===o?'true':'false');
            b2.addEventListener('click',function(){R.ans.painWhere=o;drawReview();});
            pw.appendChild(b2);
          });
          mo.appendChild(pw);
        }
      });
      var kblk=el('div','qblock');
      kblk.appendChild(el('div','q','Ø kcal laut YAZIO (optional)'));
      var ki=el('input','field');
      ki.type='number';ki.inputMode='numeric';ki.placeholder='z. B. 2280';
      ki.value=R.kcal;
      ki.addEventListener('input',function(){R.kcal=ki.value;});
      kblk.appendChild(ki);
      mo.appendChild(kblk);

      var nb2=el('button','btn','Weiter: Massnahmen');
      nb2.addEventListener('click',function(){
        var missing=QS.some(function(q){return !R.ans[q.id];});
        if(missing){toast('Bitte alle 4 Fragen beantworten');return;}
        if(R.ans.pain==='Ja'&&!R.ans.painWhere)R.ans.painWhere='Woanders';
        // YAZIO-Wert sofort übernehmen, damit die Massnahmen damit rechnen
        var v=parseFloat(R.kcal);
        if(isFinite(v)&&v>800&&v<6000){
          D.weeks[ctx.week]=Object.assign({},D.weeks[ctx.week],{avgKcal:v});
          save();
        }
        R.step=2;R.ms=null;drawReview();
      });
      mo.appendChild(nb2);
      var bb2=el('button','btn ghost','Zurück');
      bb2.addEventListener('click',function(){R.step=0;drawReview();});
      mo.appendChild(bb2);
    }

    else{
      if(!R.ms)R.ms=buildMeasures(R.ans,reviewCtx());
      mo.appendChild(el('p','sub','Das schlage ich vor. Abwählen, was du nicht willst — dann übernehmen.'));
      R.ms.forEach(function(m){
        var row=el('div','measure'+(m.fn?(m.on?' on':''):' info'));
        if(m.fn){
          var box=el('span','box',m.on?'✓':'');
          row.appendChild(box);
          row.addEventListener('click',function(){m.on=!m.on;drawReview();});
        }else{
          var dot=el('span','box','i');
          dot.style.cssText='border-style:dashed;color:var(--text-4);font-style:italic';
          row.appendChild(dot);
        }
        row.appendChild(el('span',null,m.label));
        mo.appendChild(row);
      });
      var ap=el('button','btn','Übernehmen & Woche abschliessen');
      ap.addEventListener('click',function(){
        var applied=[];
        R.ms.forEach(function(m){ if(m.fn&&m.on){m.fn();applied.push(m.id);} });
        var rec={seen:true,answers:R.ans,measures:applied};
        var v=parseFloat(R.kcal);
        if(isFinite(v)&&v>800&&v<6000)rec.avgKcal=v;
        D.weeks[ctx.week]=Object.assign({},D.weeks[ctx.week],rec);
        save();closeModal();render();
        toast('Review abgeschlossen · Ziel '+targets().kcal+' kcal');
      });
      mo.appendChild(ap);
      var bb3=el('button','btn ghost','Zurück');
      bb3.addEventListener('click',function(){R.step=1;drawReview();});
      mo.appendChild(bb3);
    }
  });
}

var TABS=[
  {id:'heute',label:'Heute',color:'oklch(0.75 0.14 235)',icon:'<path d="M3 11L12 4l9 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 10v9a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1v-9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'},
  {id:'gewicht',label:'Gewicht',color:'oklch(0.78 0.13 195)',icon:'<path d="M4 20a8 8 0 1116 0z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M12 12l2.5-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>'},
  {id:'training',label:'Training',color:'oklch(0.74 0.15 300)',icon:'<path d="M6.5 6.5v11M17.5 6.5v11M3 9.5v5M21 9.5v5M6.5 12h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>'},
  {id:'food',label:'Ernährung',color:'oklch(0.78 0.14 55)',icon:'<path d="M7 3v8a2 2 0 002 2h0V3M7 7h4M9 13v8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M17 3c-1.5 2-2 3.5-2 6 0 1.5.8 2.5 2 2.5V21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'},
  {id:'trends',label:'Trends',color:'oklch(0.75 0.16 150)',icon:'<path d="M4 17l5-5 3 3 7-8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 7h4v4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'}
];
function buildTabs(){
  var n=$('tabs');n.textContent='';
  TABS.forEach(function(t){
    var b=el('button');
    b.type='button';
    b.innerHTML='<svg viewBox="0 0 24 24" fill="none" aria-hidden="true">'+t.icon+'</svg>';
    b.appendChild(el('span',null,t.label));
    b.addEventListener('click',function(){UI.tab=t.id;window.scrollTo(0,0);render();});
    n.appendChild(b);
  });
}
function render(){
  if(!D)return;
  TABS.forEach(function(t,i){
    var on=UI.tab===t.id;
    var b=$('tabs').children[i];
    if(on){b.setAttribute('aria-current','page');b.style.color=t.color;}
    else{b.removeAttribute('aria-current');b.style.color='';}
    $('s-'+t.id).classList.toggle('hidden',!on);
  });
  if(UI.tab==='heute')renderHeute();
  else if(UI.tab==='gewicht')renderGewicht();
  else if(UI.tab==='training')renderTraining();
  else if(UI.tab==='food')renderFood();
  else renderTrends();
}

// ── Boot: Speicher-Schichten laden, dann rendern ──────────
buildTabs();
LS_OK=lsAvailable();
var _lsRaw=null;
if(LS_OK){ try{_lsRaw=localStorage.getItem(KEY);}catch(e){_lsRaw=null;} }
idbOpen(function(db){
  IDB=db;
  if(_lsRaw!=null){
    STORE_LAYER='localStorage';
    D=parseState(_lsRaw);
    if(IDB)idbSet(IDB,_lsRaw);            // spiegeln
    render();
  }else if(db){
    idbGet(db,function(v){
      D=parseState(v);
      STORE_LAYER=v!=null?'IndexedDB':(LS_OK?'localStorage':'none');
      if(v!=null&&LS_OK){ try{localStorage.setItem(KEY,v);}catch(e){} }
      render();
    });
  }else{
    D=parseState(null);
    STORE_LAYER=LS_OK?'localStorage':'none';
    render();
  }
});

document.addEventListener('visibilitychange',function(){ if(document.visibilityState==='hidden')save(); });
window.addEventListener('pagehide',function(){ save(); });
window.addEventListener('beforeunload',function(e){
  save();
  if(_workoutGuard){ e.preventDefault(); e.returnValue=''; }
});
